<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>씨네테이스트</title>
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="씨네테이스트">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f; --bg2:#13131c; --card:#16161f; --line:#27273a;
    --txt:#f0eef5; --dim:#9a98ad; --gold:#e8b84b; --red:#e0484d; --teal:#3ad0c8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;}
  body{display:flex;flex-direction:column;height:100%;}
  body::before{content:"";position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top);background:var(--bg);z-index:2000;pointer-events:none;}

  header{padding:calc(14px + env(safe-area-inset-top)) 18px 12px;background:linear-gradient(180deg,#13131c,#0a0a0f);border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:baseline;gap:9px;}
  .brand h1{font-family:'Anton',sans-serif;font-size:27px;letter-spacing:1px;color:var(--txt);font-weight:400;}
  .brand h1 .ac{color:var(--gold);}
  .brand .sub{font-size:11px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}

  #tabs{display:flex;gap:7px;margin-top:13px;}
  .tab{flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--dim);padding:9px 0;
    border-radius:10px;border:1px solid var(--line);background:#101019;cursor:pointer;transition:.15s;}
  .tab.active{background:var(--gold);color:#1a1505;border-color:var(--gold);}

  main{flex:1;overflow-y:auto;padding:16px 18px 40px;-webkit-overflow-scrolling:touch;}
  .view{display:none;}
  .view.show{display:block;}

  /* 검색 */
  #searchWrap{position:relative;margin-bottom:16px;}
  #q{width:100%;padding:13px 40px 13px 14px;font-size:15px;font-family:inherit;color:var(--txt);
    background:var(--card);border:1px solid var(--line);border-radius:12px;outline:none;}
  #q:focus{border-color:var(--gold);}
  #qClear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;
    background:#2a2a3a;color:var(--dim);border-radius:50%;font-size:15px;cursor:pointer;display:none;}

  .hint{color:var(--dim);font-size:13px;line-height:1.7;text-align:center;margin-top:40px;padding:0 20px;}
  .hint b{color:var(--gold);}

  /* 영화 행 */
  .mRow{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:10px;margin-bottom:11px;align-items:center;}
  .mPoster{width:62px;height:93px;border-radius:8px;object-fit:cover;background:#222;flex-shrink:0;}
  .mPosterEmpty{width:62px;height:93px;border-radius:8px;background:#1e1e2a;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-size:22px;color:#444;}
  .mInfo{flex:1;min-width:0;}
  .mTitle{font-size:15px;font-weight:700;line-height:1.3;}
  .mMeta{font-size:12px;color:var(--dim);margin-top:3px;}
  .mGenre{font-size:11px;color:#7a7a90;margin-top:5px;line-height:1.4;}
  .mOverview{font-size:11.5px;color:#85839a;margin-top:6px;line-height:1.45;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .tmdbScore{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--gold);font-weight:700;}

  /* 별점 */
  .stars{display:flex;gap:0;margin-top:10px;touch-action:pan-y;}
  .star{font-size:30px;color:#3a3a4a;cursor:pointer;line-height:1;transition:.1s;padding:4px 7px;}
  .star.on{color:var(--gold);}
  .star:active{transform:scale(1.12);}

  .btn{font-family:inherit;font-weight:700;font-size:12.5px;border:none;border-radius:9px;padding:8px 13px;cursor:pointer;}
  .btnAdd{background:var(--teal);color:#04201e;}
  .btnDel{background:#2a2a3a;color:var(--red);}
  .mActions{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;}

  .myScore{font-size:12px;font-weight:700;color:var(--gold);background:#241d08;
    padding:3px 9px;border-radius:20px;display:inline-block;}
  .rowBottom{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .wishBtn{font-family:inherit;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;
    background:#1c1c28;color:var(--dim);border:1px solid var(--line);cursor:pointer;}
  .wishBtn.on{background:#241d08;color:var(--gold);border-color:#4a3c12;}
  .unrateBtn{font-family:inherit;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;
    background:#2a1416;color:#e0888c;border:1px solid #5a2228;cursor:pointer;}
  .dmWish{margin:6px 0 4px;font-size:13px;padding:9px 16px;}

  .secTitle{font-size:13px;font-weight:900;color:var(--dim);letter-spacing:1px;text-transform:uppercase;
    margin:24px 0 13px;display:flex;align-items:center;gap:9px;}
  .secTitle::after{content:"";flex:1;height:1px;background:var(--line);}
  .secTitle:first-child{margin-top:0;}

  .countTag{font-size:11px;color:var(--dim);background:#1c1c28;padding:2px 8px;border-radius:20px;}

  /* 추천 분석 박스 */
  .tasteBox{background:linear-gradient(135deg,#1a1505,#16161f);border:1px solid #3a2f10;
    border-radius:14px;padding:14px;margin-bottom:18px;}
  .tasteBox h3{font-size:13px;color:var(--gold);margin-bottom:9px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-size:11px;color:#e8d9a8;background:#2a2208;border:1px solid #4a3c12;padding:5px 12px;border-radius:20px;cursor:pointer;transition:.12s;}
  .chip.on{background:var(--gold);color:#1a1505;border-color:var(--gold);font-weight:700;}
  .tasteHint{font-size:10px;color:#8a7a4a;font-weight:400;margin-left:6px;}
  .recBtns{display:flex;flex-direction:column;gap:9px;margin:18px 0 10px;}
  .recBtn{font-family:inherit;font-weight:700;font-size:13.5px;padding:13px;border-radius:11px;cursor:pointer;border:1px solid var(--line);}
  .recBtn.more{background:var(--teal);color:#04201e;border-color:var(--teal);}
  .recBtn.refresh{background:#1c1c28;color:var(--gold);}
  .recBtn.refresh2{background:transparent;color:var(--dim);}
  .recWhy{font-size:10.5px;color:var(--teal);margin-top:6px;}

  .loading{text-align:center;color:var(--dim);font-size:13px;padding:30px;}
  .spin{display:inline-block;width:18px;height:18px;border:2px solid #2a2a3a;border-top-color:var(--gold);
    border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes sp{to{transform:rotate(360deg);}}

  .empty{text-align:center;color:var(--dim);font-size:13px;padding:40px 20px;line-height:1.7;}
  .err{background:#2a1416;border:1px solid #5a2228;color:#f0a0a4;font-size:12px;padding:11px 13px;border-radius:10px;margin:12px 0;line-height:1.5;}

  .mPosterWrap{cursor:pointer;flex-shrink:0;}
  .mTitle{cursor:pointer;}
  .stars{touch-action:none;} /* 드래그 중 스크롤 방지 */

  /* 상세 모달 */
  #detailModal{position:fixed;inset:0;z-index:3000;display:none;}
  #detailModal.show{display:block;}
  .dmBackdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(3px);}
  .dmCard{position:absolute;left:0;right:0;bottom:0;max-height:88%;overflow-y:auto;
    background:var(--bg2);border-top:1px solid var(--line);border-radius:20px 20px 0 0;
    padding:22px 20px calc(28px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;}
  #dmClose{position:absolute;right:16px;top:14px;width:32px;height:32px;border:none;border-radius:50%;
    background:#2a2a3a;color:var(--dim);font-size:19px;cursor:pointer;z-index:2;}
  .dmHead{display:flex;gap:14px;}
  .dmPoster{width:96px;height:144px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#222;}
  .dmHeadInfo{flex:1;min-width:0;padding-right:30px;}
  .dmTitle{font-size:20px;font-weight:900;line-height:1.3;}
  .dmOrig{font-size:12px;color:var(--dim);margin-top:3px;}
  .dmMeta{font-size:13px;color:var(--dim);margin-top:8px;}
  .dmGenre{font-size:12px;color:var(--gold);margin-top:7px;}
  .dmStars{display:flex;align-items:center;gap:0;margin:16px 0 4px;touch-action:pan-y;flex-wrap:wrap;}
  .dmStars .star{font-size:30px;padding:4px 7px;}
  .dmRow{display:flex;gap:10px;margin-top:11px;font-size:13px;}
  .dmK{color:var(--dim);min-width:38px;font-weight:700;}
  .dmV{color:var(--txt);flex:1;line-height:1.5;}
  .dmOverview{font-size:13.5px;color:#c8c6d5;line-height:1.7;margin-top:15px;
    border-top:1px solid var(--line);padding-top:15px;}
</style>
</head>
<body>
<header>
  <div class="brand"><h1>씨네<span class="ac">테이스트</span></h1><span class="sub">Cine Taste</span></div>
  <div id="tabs">
    <div class="tab active" data-v="search">검색·평가</div>
    <div class="tab" data-v="mine">내 평점</div>
    <div class="tab" data-v="recs">추천</div>
    <div class="tab" data-v="wish">보고싶다</div>
  </div>
</header>

<main>
  <!-- 검색 -->
  <div class="view show" id="v-search">
    <div id="searchWrap">
      <input id="q" type="text" placeholder="영화 제목 검색 (예: 기생충, 다크나이트)" autocomplete="off">
      <button id="qClear">×</button>
    </div>
    <div id="searchResults"></div>
    <div class="hint" id="searchHint">본 영화를 검색해서 <b>별점</b>을 매겨보세요.<br>평점이 쌓이면 취향을 분석해<br><b>비슷한 영화</b>를 추천해 드려요.</div>
  </div>

  <!-- 내 평점 -->
  <div class="view" id="v-mine">
    <div id="mineList"></div>
  </div>

  <!-- 추천 -->
  <div class="view" id="v-recs">
    <div id="recsBox"></div>
  </div>

  <!-- 보고싶다 -->
  <div class="view" id="v-wish">
    <div id="wishList"></div>
  </div>
</main>

<div id="detailModal">
  <div class="dmBackdrop"></div>
  <div class="dmCard">
    <button id="dmClose">×</button>
    <div id="dmBody"></div>
  </div>
</div>
<script>
const API_KEY="864e86895b703ac1bf9cc387096d6e80";
const IMG="https://image.tmdb.org/t/p/w185";
const BASE="https://api.themoviedb.org/3";
const $=s=>document.querySelector(s);

// ---- 저장 (이 기기에만) ----
const STORE="cinetaste_ratings_v1";
const WSTORE="cinetaste_wish_v1";
let RATED={}; // id -> {id,title,year,poster,genres:[ids],rating,overview,vote}
let WISH={};  // id -> movie (보고싶은 영화)
function load(){
  try{RATED=JSON.parse(localStorage.getItem(STORE))||{};}catch(e){RATED={};}
  try{WISH=JSON.parse(localStorage.getItem(WSTORE))||{};}catch(e){WISH={};}
}
function save(){ try{localStorage.setItem(STORE,JSON.stringify(RATED));}catch(e){} }
function saveWish(){ try{localStorage.setItem(WSTORE,JSON.stringify(WISH));}catch(e){} }
load();

// ---- 장르 맵 ----
let GENRES={};
async function loadGenres(){
  try{
    const r=await fetch(`${BASE}/genre/movie/list?api_key=${API_KEY}&language=ko-KR`);
    const d=await r.json();
    (d.genres||[]).forEach(g=>GENRES[g.id]=g.name);
  }catch(e){}
}
const gname=id=>GENRES[id]||"";

// ---- API ----
async function searchMovies(q){
  async function hit(query){
    const r=await fetch(`${BASE}/search/movie?api_key=${API_KEY}&language=ko-KR&query=${encodeURIComponent(query)}&include_adult=false`);
    if(!r.ok) throw new Error("검색 실패 ("+r.status+")");
    const d=await r.json();
    return (d.results||[]).filter(m=>m.poster_path||m.overview);
  }
  let res=await hit(q);
  if(res.length) return res;
  // 결과 없으면 띄어쓰기 변형 시도: 공백 제거 / 공백 넣기
  const noSpace=q.replace(/\s+/g,'');
  if(noSpace!==q){ res=await hit(noSpace); if(res.length) return res; }
  // 붙여쓴 한글을 2~5글자 단위로 끊어 공백 삽입 시도
  if(!/\s/.test(q) && q.length>=4){
    for(const cut of [2,3,4]){
      const spaced=q.slice(0,cut)+' '+q.slice(cut);
      res=await hit(spaced);
      if(res.length) return res;
    }
  }
  return [];
}
async function similarOf(id){
  // recommendations(개인화) + similar(장르기반) 둘 다 모아 다양성 ↑
  const urls=[
    `${BASE}/movie/${id}/recommendations?api_key=${API_KEY}&language=ko-KR`,
    `${BASE}/movie/${id}/similar?api_key=${API_KEY}&language=ko-KR`
  ];
  const out=[]; const seen=new Set();
  for(const u of urls){
    try{
      const r=await fetch(u); const d=await r.json();
      (d.results||[]).forEach(m=>{ if(!seen.has(m.id)){ seen.add(m.id); out.push(m); } });
    }catch(e){}
  }
  return out;
}

// ---- 렌더 헬퍼 ----
function posterTag(m){
  return m.poster_path
    ? `<img class="mPoster" src="${IMG}${m.poster_path}" alt="">`
    : `<div class="mPosterEmpty">🎬</div>`;
}
function yearOf(m){ return (m.release_date||"").slice(0,4); }

function movieRowHtml(m,opts={}){
  const gids=m.genre_ids||m.genres||[];
  const gtext=gids.slice(0,3).map(gname).filter(Boolean).join(' · ');
  const rated=RATED[m.id];
  const stars=[1,2,3,4,5].map(n=>`<span class="star ${rated&&rated.rating>=n?'on':''}" data-id="${m.id}" data-n="${n}">★</span>`).join('');
  return `<div class="mRow">
    <div class="mPosterWrap" data-detail="${m.id}">${posterTag(m)}</div>
    <div class="mInfo">
      <div class="mTitle" data-detail="${m.id}">${esc(m.title)}</div>
      <div class="mMeta">${yearOf(m)||'—'} ${m.vote_average?`· <span class="tmdbScore">★ ${m.vote_average.toFixed(1)}</span>`:''}</div>
      ${gtext?`<div class="mGenre">${gtext}</div>`:''}
      ${opts.overview&&m.overview?`<div class="mOverview" data-detail="${m.id}">${esc(m.overview)}</div>`:''}
      ${opts.why?`<div class="recWhy">${esc(opts.why)}</div>`:''}
      <div class="stars" data-mid="${m.id}">${stars}</div>
      <div class="rowBottom">
        ${rated?`<span class="myScore">내 평점 ★${rated.rating}</span>`:''}
        <button class="wishBtn ${WISH[m.id]?'on':''}" data-wish="${m.id}">${WISH[m.id]?'★ 보고싶음':'☆ 보고싶다'}</button>
        ${opts.del?`<button class="unrateBtn" data-unrate="${m.id}">평점 취소</button>`:''}
      </div>
    </div>
  </div>`;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---- 별점: 탭 + 드래그 통합 (한 행만 정확히 조작) ----
// 손가락 x좌표가 어느 별 위인지 — 별의 '오른쪽 끝'까지 포함해 그 별 번호 반환. 별 영역 밖 왼쪽이면 0
function starFromPoint(starsEl,clientX){
  const stars=[...starsEl.querySelectorAll('.star')];
  let pick=0;
  for(const s of stars){
    const r=s.getBoundingClientRect();
    if(clientX>=r.left) pick=+s.dataset.n;   // 이 별의 왼쪽을 지났으면 그 별까지 채움
  }
  // 맨 첫 별 왼쪽보다도 왼쪽을 누르면 1점으로 (별 영역 안이므로)
  if(pick===0 && stars.length){
    const first=stars[0].getBoundingClientRect();
    if(clientX>=first.left-10) pick=1;
  }
  return pick;
}
function previewStars(starsEl,n){
  starsEl.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.n<=n));
}
function restoreStars(starsEl,id){
  // 저장된 평점으로 되돌림 (미리보기 잔상 제거)
  const r=RATED[id];
  starsEl.querySelectorAll('.star').forEach(s=>s.classList.toggle('on', r && r.rating>=+s.dataset.n));
}
let activeStars=null, activeId=null, movedX=0, startX=0, startedOnStar=false;
function onStarDown(e){
  const star=e.target.closest('.star');           // 반드시 별 위에서 시작
  const starsEl=e.target.closest('.stars, .dmStars');
  if(!starsEl || !star) return;                   // 별이 아니면(여백·옆) 무시 → 스크롤 정상
  activeStars=starsEl; activeId=+starsEl.dataset.mid;
  startX=e.clientX; movedX=0; startedOnStar=true;
  // 다운 시점엔 미리보기 안 함
}
function onStarMove(e){
  if(!activeStars) return;
  movedX=Math.abs(e.clientX-startX);
  if(movedX>6){
    const n=starFromPoint(activeStars, e.clientX);
    if(n) previewStars(activeStars,n);
    e.preventDefault();   // 드래그 중에만 스크롤 막음
  }
}
function onStarUp(e){
  if(!activeStars){ return; }
  const starsEl=activeStars, id=activeId;
  let n=0;
  if(movedX>6){
    n=starFromPoint(starsEl, e.clientX);                 // 드래그: 손가락 위치
  } else {
    const st=(e.target&&e.target.closest)?e.target.closest('.star'):null;
    if(st && st.parentElement===starsEl) n=+st.dataset.n; // 탭: 정확히 그 별만
  }
  activeStars=null; activeId=null; startedOnStar=false;
  if(n && id){ rate(id,n); }
  else if(id){ restoreStars(starsEl,id); }
}
document.addEventListener('pointerdown',onStarDown);
document.addEventListener('pointermove',onStarMove);
document.addEventListener('pointerup',onStarUp);
document.addEventListener('pointercancel',()=>{ if(activeStars&&activeId) restoreStars(activeStars,activeId); activeStars=null;activeId=null;startedOnStar=false;});

// ---- 영화 상세 열기 (포스터·제목·줄거리 클릭) ----
document.addEventListener('click',e=>{
  if(e.target.closest('.stars, .dmStars')) return;
  if(e.target.closest('[data-wish]')) return;   // 찜 버튼은 상세 안 열기
  const d=e.target.closest('[data-detail]');
  if(d){ openDetail(+d.dataset.detail); }
});
// ---- 찜(보고싶다) 토글 ----
function toggleWish(id){
  const src=LASTRESULTS[id]||RATED[id]||WISH[id];
  if(!src) return;
  if(WISH[id]){ delete WISH[id]; }
  else {
    WISH[id]={ id, title:src.title, year:yearOf(src)||src.year||'',
      poster:src.poster_path||src.poster||null, genres:(src.genre_ids||src.genres||[]),
      overview:src.overview||'', vote:src.vote_average||src.vote||0 };
  }
  saveWish();
  // 화면의 해당 찜 버튼들 갱신 (목록 재배치 없이)
  document.querySelectorAll('[data-wish="'+id+'"]').forEach(b=>{
    const on=!!WISH[id]; b.classList.toggle('on',on);
    b.textContent=on?'★ 보고싶음':'☆ 보고싶다';
  });
  if(curView==='wish') renderWish();
}
document.addEventListener('click',e=>{
  const w=e.target.closest('[data-wish]');
  if(w){ toggleWish(+w.dataset.wish); }
  const u=e.target.closest('[data-unrate]');
  if(u){ unrate(+u.dataset.unrate); }
});
let LASTRESULTS={}; // id -> movie (검색결과 캐시, 평점 저장용)
function rate(id,n){
  const m=LASTRESULTS[id]||RATED[id];
  if(!m) return;
  RATED[id]={
    id, title:m.title, year:yearOf(m)||m.year||'',
    poster:m.poster_path||m.poster||null,
    genres:(m.genre_ids||m.genres||[]),
    rating:n, overview:m.overview||'', vote:m.vote_average||m.vote||0
  };
  save();
  RECS_DIRTY=true;   // 추천을 다음에 새로 계산해야 함 (지금 화면은 유지)
  // 현재 탭에 따라 갱신 방식 분기
  if(curView==='recs'){
    // 추천 화면은 흐트러지지 않게 — 그 영화 행의 별점/배지만 갱신
    updateStarRows(id,n);
  } else {
    refreshCurrentView();
  }
  const dmStars=document.querySelector('.dmStars[data-mid="'+id+'"]');
  if(dmStars){
    dmStars.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.n<=n));
    let badge=dmStars.querySelector('.myScore');
    if(!badge){ badge=document.createElement('span'); badge.className='myScore'; dmStars.appendChild(badge); }
    badge.textContent='내 평점 ★'+n;
  }
}
// 화면에 보이는 같은 영화의 별점 행들을 갱신 (목록 재배치 없이)
function updateStarRows(id,n){
  document.querySelectorAll('.stars[data-mid="'+id+'"], .dmStars[data-mid="'+id+'"]').forEach(starsEl=>{
    starsEl.querySelectorAll('.star').forEach(s=>s.classList.toggle('on',+s.dataset.n<=n));
    const info=starsEl.closest('.mInfo')||starsEl.parentElement;
    let badge=info.querySelector('.myScore');
    if(!badge){ badge=document.createElement('span'); badge.className='myScore'; info.appendChild(badge); }
    badge.textContent='내 평점 ★'+n;
  });
}
function unrate(id){
  delete RATED[id]; save(); RECS_DIRTY=true;
  // 화면의 별점 표시 초기화
  document.querySelectorAll('.stars[data-mid="'+id+'"], .dmStars[data-mid="'+id+'"]').forEach(starsEl=>{
    starsEl.querySelectorAll('.star').forEach(s=>s.classList.remove('on'));
    const info=starsEl.closest('.mInfo')||starsEl.parentElement;
    const badge=info.querySelector('.myScore'); if(badge) badge.remove();
  });
  refreshCurrentView();
}

// ---- 검색 ----
let qTimer=null;
$('#q').addEventListener('input',e=>{
  const v=e.target.value.trim();
  $('#qClear').style.display=v?'block':'none';
  clearTimeout(qTimer);
  if(!v){ $('#searchResults').innerHTML=''; $('#searchHint').style.display='block'; return; }
  qTimer=setTimeout(()=>doSearch(v),400);
});
$('#qClear').addEventListener('click',()=>{
  $('#q').value=''; $('#qClear').style.display='none';
  $('#searchResults').innerHTML=''; $('#searchHint').style.display='block'; $('#q').focus();
});
async function doSearch(q){
  $('#searchHint').style.display='none';
  $('#searchResults').innerHTML='<div class="loading"><span class="spin"></span>검색 중…</div>';
  try{
    const res=await searchMovies(q);
    LASTRESULTS={}; res.forEach(m=>LASTRESULTS[m.id]=m);
    if(!res.length){ $('#searchResults').innerHTML='<div class="empty">검색 결과가 없어요.<br>다른 제목으로 찾아보세요.</div>'; return; }
    $('#searchResults').innerHTML=res.map(m=>movieRowHtml(m,{overview:true})).join('');
  }catch(err){
    $('#searchResults').innerHTML=`<div class="err">${esc(err.message)}<br>인터넷 연결을 확인해 주세요.</div>`;
  }
}

// ---- 내 평점 ----
function renderMine(){
  const arr=Object.values(RATED).sort((a,b)=>b.rating-a.rating||a.title.localeCompare(b.title));
  if(!arr.length){ $('#mineList').innerHTML='<div class="empty">아직 평가한 영화가 없어요.<br>검색 탭에서 별점을 매겨보세요.</div>'; return; }
  arr.forEach(m=>LASTRESULTS[m.id]={id:m.id,title:m.title,release_date:m.year+'-01-01',poster_path:m.poster,genre_ids:m.genres,overview:m.overview,vote_average:m.vote});
  const head=`<div class="secTitle">내가 평가한 영화 <span class="countTag">${arr.length}편</span></div>`;
  $('#mineList').innerHTML=head+arr.map(m=>{
    const mm={id:m.id,title:m.title,release_date:(m.year||'')+'-01-01',poster_path:m.poster,genre_ids:m.genres,vote_average:m.vote,overview:m.overview};
    return movieRowHtml(mm,{del:true});
  }).join('');
}

// ---- 보고싶다 ----
function renderWish(){
  const arr=Object.values(WISH);
  if(!arr.length){ $('#wishList').innerHTML='<div class="empty">아직 보고싶은 영화가 없어요.<br>영화의 ☆ 보고싶다 버튼을 눌러보세요.</div>'; return; }
  arr.forEach(m=>LASTRESULTS[m.id]={id:m.id,title:m.title,release_date:(m.year||'')+'-01-01',poster_path:m.poster,genre_ids:m.genres,overview:m.overview,vote_average:m.vote});
  const head=`<div class="secTitle">보고싶은 영화 <span class="countTag">${arr.length}편</span></div>`;
  $('#wishList').innerHTML=head+arr.map(m=>{
    const mm={id:m.id,title:m.title,release_date:(m.year||'')+'-01-01',poster_path:m.poster,genre_ids:m.genres,vote_average:m.vote,overview:m.overview};
    return movieRowHtml(mm,{overview:true});
  }).join('');
}

// ---- 추천 (내 평점 + 장르/키워드 가중치) ----
let RECS_CACHE=null;     // 전체 후보(점수순) 캐시
let RECS_FILTER=null;    // 선택된 장르 id (null=전체)
let RECS_PAGE=0;         // 30편 단위 페이지
let RECS_DIRTY=false;    // 평점이 바뀌어 재계산 필요 표시

async function renderRecs(force){
  const rated=Object.values(RATED);
  if(rated.length<1){
    $('#recsBox').innerHTML='<div class="empty">평가한 영화가 있어야 추천할 수 있어요.<br>먼저 본 영화에 별점을 매겨주세요.</div>';
    RECS_CACHE=null; return;
  }
  // 캐시가 없거나 / 강제 / 평점 변경(dirty)일 때만 다시 계산
  if(!RECS_CACHE || force || RECS_DIRTY){
    RECS_DIRTY=false;
    $('#recsBox').innerHTML='<div class="loading"><span class="spin"></span>취향 분석 중…</div>';
    const genreW={};
    rated.forEach(m=>{ const w=m.rating-2.5; (m.genres||[]).forEach(g=>{ genreW[g]=(genreW[g]||0)+w; }); });
    const seeds=rated.slice().sort((a,b)=>b.rating-a.rating).slice(0,12);
    const seen=new Set(rated.map(m=>m.id));
    const cand={};
    for(const s of seeds){
      const seedWeight=Math.max(0.2, s.rating-2);
      const sims=await similarOf(s.id);
      sims.forEach((m,idx)=>{
        if(seen.has(m.id)) return;
        if(!cand[m.id]) cand[m.id]={m,score:0,from:[],seedScore:0};
        let gs=0; (m.genre_ids||[]).forEach(g=>{ gs+=(genreW[g]||0); });
        const rankBonus=Math.max(0,(20-idx))*0.04;
        cand[m.id].score += seedWeight + gs*0.25 + (m.vote_average||0)*0.04 + rankBonus;
        cand[m.id].seedScore += seedWeight + rankBonus;  // 장르필터용(가중치 제외) 점수
        if(!cand[m.id].from.includes(s.title)) cand[m.id].from.push(s.title);
      });
    }
    RECS_CACHE={ list:Object.values(cand).sort((a,b)=>b.score-a.score), genreW };
    RECS_PAGE=0;
  }
  paintRecs();
}

function paintRecs(){
  const {list,genreW}=RECS_CACHE;
  list.forEach(c=>LASTRESULTS[c.m.id]=c.m);

  // 취향 칩 (누르면 그 장르만 필터)
  const topG=Object.entries(genreW).filter(([,w])=>w>0).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([g])=>+g);
  let html=`<div class="tasteBox"><h3>🎯 내 취향 분석 <span class="tasteHint">장르를 누르면 그 장르만 봐요</span></h3>
    <div class="chips">
      <span class="chip ${RECS_FILTER===null?'on':''}" data-g="all">전체</span>
      ${topG.map(g=>`<span class="chip ${RECS_FILTER===g?'on':''}" data-g="${g}">${gname(g)}</span>`).join('')}
    </div></div>`;

  // 필터 적용 — 장르를 고르면 그 장르 안에서는 가중치 빼고 '내 취향 출처 + TMDB 평점'으로 정렬
  let filtered;
  if(RECS_FILTER===null){
    filtered=list;   // 전체: 장르 가중치 포함 점수순(이미 정렬됨)
  } else {
    filtered=list.filter(c=>(c.m.genre_ids||[]).includes(RECS_FILTER))
      .slice().sort((a,b)=>(b.seedScore+(b.m.vote_average||0)*0.1)-(a.seedScore+(a.m.vote_average||0)*0.1));
  }
  const total=filtered.length;
  const pageItems=filtered.slice(RECS_PAGE*30,(RECS_PAGE+1)*30);

  if(!pageItems.length){
    if(RECS_PAGE>0){ RECS_PAGE=0; paintRecs(); return; }
    html+='<div class="empty">이 장르의 추천이 없어요.<br>다른 장르나 전체를 눌러보세요.</div>';
    $('#recsBox').innerHTML=html; return;
  }
  const filterName=RECS_FILTER===null?'추천 영화':gname(RECS_FILTER)+' 추천';
  html+=`<div class="secTitle">${filterName} <span class="countTag">${total}편 중 ${RECS_PAGE*30+1}~${RECS_PAGE*30+pageItems.length}</span></div>`;
  html+=pageItems.map(c=>{
    const why='비슷한 영화: '+[...c.from].slice(0,2).join(', ');
    return movieRowHtml(c.m,{overview:true,why});
  }).join('');

  // 더보기 / 새로고침 버튼
  const hasMore=(RECS_PAGE+1)*30<total;
  html+=`<div class="recBtns">
    ${hasMore?`<button class="recBtn more" id="recMore">다음 ${Math.min(30,total-(RECS_PAGE+1)*30)}편 보기 ↓</button>`:`<button class="recBtn refresh" id="recRefresh">처음부터 다시 보기 ↻</button>`}
    <button class="recBtn refresh2" id="recReload">새로 추천받기 ↻</button>
  </div>`;

  $('#recsBox').innerHTML=html;
  document.getElementById('recsBox').scrollTop=0;
}

// 추천 칩·버튼 클릭
document.addEventListener('click',e=>{
  const chip=e.target.closest('.chip[data-g]');
  if(chip){
    RECS_FILTER = chip.dataset.g==='all' ? null : +chip.dataset.g;
    RECS_PAGE=0; paintRecs(); return;
  }
  if(e.target.id==='recMore'){ RECS_PAGE++; paintRecs(); window.scrollTo(0,0); $('main').scrollTop=0; }
  if(e.target.id==='recRefresh'){ RECS_PAGE=0; paintRecs(); $('main').scrollTop=0; }
  if(e.target.id==='recReload'){ renderRecs(true); $('main').scrollTop=0; }
});

// ---- 영화 상세 ----
async function openDetail(id){
  const modal=$('#detailModal'); const body=$('#dmBody');
  body.innerHTML='<div class="loading"><span class="spin"></span>불러오는 중…</div>';
  modal.classList.add('show');
  try{
    const r=await fetch(`${BASE}/movie/${id}?api_key=${API_KEY}&language=ko-KR&append_to_response=credits`);
    const d=await r.json();
    const dir=(d.credits&&d.credits.crew||[]).filter(c=>c.job==='Director').map(c=>c.name).join(', ');
    const cast=(d.credits&&d.credits.cast||[]).slice(0,5).map(c=>c.name).join(', ');
    const genres=(d.genres||[]).map(g=>g.name).join(' · ');
    const runtime=d.runtime?d.runtime+'분':'';
    const year=(d.release_date||'').slice(0,4);
    const rated=RATED[id];
    LASTRESULTS[id]={id,title:d.title,release_date:d.release_date,poster_path:d.poster_path,genre_ids:(d.genres||[]).map(g=>g.id),overview:d.overview,vote_average:d.vote_average};
    const stars=[1,2,3,4,5].map(n=>`<span class="star ${rated&&rated.rating>=n?'on':''}" data-id="${id}" data-n="${n}">★</span>`).join('');
    body.innerHTML=`
      <div class="dmHead">
        ${d.poster_path?`<img class="dmPoster" src="https://image.tmdb.org/t/p/w342${d.poster_path}">`:''}
        <div class="dmHeadInfo">
          <div class="dmTitle">${esc(d.title)}</div>
          ${d.original_title&&d.original_title!==d.title?`<div class="dmOrig">${esc(d.original_title)}</div>`:''}
          <div class="dmMeta">${year||'—'}${runtime?' · '+runtime:''}${d.vote_average?` · <span class="tmdbScore">★ ${d.vote_average.toFixed(1)}</span>`:''}</div>
          ${genres?`<div class="dmGenre">${genres}</div>`:''}
        </div>
      </div>
      <div class="dmStars" data-mid="${id}">${stars}${rated?`<span class="myScore">내 평점 ★${rated.rating}</span>`:''}</div>
      <button class="wishBtn dmWish ${WISH[id]?'on':''}" data-wish="${id}">${WISH[id]?'★ 보고싶음':'☆ 보고싶다'}</button>
      ${dir?`<div class="dmRow"><span class="dmK">감독</span><span class="dmV">${esc(dir)}</span></div>`:''}
      ${cast?`<div class="dmRow"><span class="dmK">출연</span><span class="dmV">${esc(cast)}</span></div>`:''}
      ${d.overview?`<div class="dmOverview">${esc(d.overview)}</div>`:'<div class="dmOverview" style="color:#666">줄거리 정보가 없어요.</div>'}
    `;
  }catch(e){
    body.innerHTML='<div class="err">정보를 불러오지 못했어요. 인터넷을 확인해 주세요.</div>';
  }
}
$('#dmClose').addEventListener('click',()=>$('#detailModal').classList.remove('show'));
$('#detailModal').querySelector('.dmBackdrop').addEventListener('click',()=>$('#detailModal').classList.remove('show'));

// ---- 탭 ----
let curView='search';
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    curView=t.dataset.v;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
    $('#v-'+curView).classList.add('show');
    refreshCurrentView();
  });
});
function refreshCurrentView(){
  if(curView==='mine') renderMine();
  else if(curView==='recs') renderRecs();
  else if(curView==='wish') renderWish();
  // 검색 탭: 별점 표시만 갱신 (현재 보이는 행의 별 on/off)
  if(curView==='search'){
    document.querySelectorAll('#searchResults .mRow').forEach(row=>{
      const stars=row.querySelectorAll('.star');
      if(!stars.length) return;
      const id=+stars[0].dataset.id;
      const r=RATED[id];
      stars.forEach(s=>s.classList.toggle('on', r && r.rating>=+s.dataset.n));
      let badge=row.querySelector('.myScore');
      if(r){
        if(!badge){ badge=document.createElement('span'); badge.className='myScore'; row.querySelector('.mInfo').appendChild(badge); }
        badge.textContent='내 평점 ★'+r.rating;
      } else if(badge){ badge.remove(); }
    });
  }
}

(async function init(){
  await loadGenres();
})();
